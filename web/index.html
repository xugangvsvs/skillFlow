<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillFlow Web Assistant</title>
  <style>
    :root {
      --bg: #f3f6f1;
      --panel: #fffdf7;
      --ink: #1b1f18;
      --muted: #52604f;
      --line: #d8e0d2;
      --accent: #1f7a4c;
      --accent-ink: #ecfff4;
      --terminal-bg: #111611;
      --terminal-ink: #c4ffd6;
      --warn: #a33a2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 15%, #d2e7d5 0%, transparent 26%),
        radial-gradient(circle at 88% 10%, #f5e5bf 0%, transparent 30%),
        linear-gradient(160deg, #eef4eb 0%, #f9f6ec 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1200px, 96vw);
      margin: 20px auto;
      display: grid;
      gap: 14px;
      grid-template-columns: 320px 1fr;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(40, 54, 35, 0.08);
      overflow: hidden;
    }

    .card h2 {
      margin: 0;
      padding: 14px 16px;
      font-size: 18px;
      background: linear-gradient(90deg, #eef7ee, #fef7df);
      border-bottom: 1px solid var(--line);
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 8px 8px 0;
      background: linear-gradient(90deg, #eef7ee, #fef7df);
      border-bottom: 1px solid var(--line);
    }

    .tab {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 8px 8px 0 0;
      background: transparent;
      cursor: pointer;
      font: inherit;
      color: var(--muted);
    }

    .tab:hover {
      color: var(--ink);
    }

    .tab.active {
      background: #fffdf7;
      border-color: var(--line);
      border-bottom-color: #fffdf7;
      color: var(--ink);
      font-weight: 600;
      margin-bottom: -1px;
    }

    .skill-item.unavailable {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .skill-item.unavailable:hover,
    .skill-item.unavailable.active {
      border-color: var(--line);
      background: #fff;
    }

    #skill-list {
      list-style: none;
      margin: 0;
      padding: 8px;
      max-height: 70vh;
      overflow: auto;
    }

    #skill-search {
      width: calc(100% - 16px);
      margin: 10px 8px 2px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      background: #fff;
    }

    .skill-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin: 8px 0;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #fff;
    }

    .skill-item:hover,
    .skill-item.active {
      border-color: var(--accent);
      background: #f1fff5;
    }

    .skill-item small {
      color: var(--muted);
      display: block;
      margin-top: 6px;
      line-height: 1.35;
    }

    .main {
      display: grid;
      gap: 14px;
      grid-template-rows: auto 1fr;
    }

    .toolbar {
      padding: 16px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }

    #analysis-input {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      background: #fff;
    }

    #log-file {
      width: 100%;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    #dynamic-inputs {
      display: grid;
      gap: 10px;
    }

    .dynamic-field {
      display: grid;
      gap: 6px;
    }

    .dynamic-field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .dynamic-field .field-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      font-weight: 400;
      margin-top: -2px;
    }

    .dynamic-field input,
    .dynamic-field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--accent);
      color: var(--accent-ink);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
    }

    #terminal-output {
      margin: 0;
      padding: 16px;
      min-height: 320px;
      max-height: 56vh;
      overflow: auto;
      white-space: pre-wrap;
      font: 14px/1.45 "Consolas", "Courier New", monospace;
      color: var(--terminal-ink);
      background: linear-gradient(180deg, #0e170f 0%, #121b13 100%);
    }

    .error { color: #ffc2b6; }

    @media (max-width: 960px) {
      .shell {
        grid-template-columns: 1fr;
      }

      #skill-list {
        max-height: 240px;
      }

      #terminal-output {
        max-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="shell">
    <section class="card">
      <h2>SkillFlow Web Assistant</h2>
      <div class="tabs" role="tablist">
        <button type="button" class="tab active" id="tab-skills" role="tab" aria-selected="true">Skills</button>
        <button type="button" class="tab" id="tab-usecases" role="tab" aria-selected="false">Use Cases</button>
      </div>
      <input id="skill-search" type="text" placeholder="Search skills..." aria-label="Filter list">
      <ul id="skill-list">
        <li class="note">Loading skills...</li>
      </ul>
    </section>

    <section class="main">
      <div class="card toolbar">
        <p id="selected-skill">Selected: none</p>
        <div id="dynamic-inputs"></div>
        <textarea id="analysis-input" placeholder="Enter logs or analysis request..."></textarea>
        <input id="log-file" type="file" accept=".log,.txt,.md,.json,.xml,.csv">
        <div class="actions">
          <button id="analyze-btn" type="button">Analyze</button>
          <span class="note" id="status-text">Idle</span>
        </div>
      </div>

      <div class="card">
        <h2>Stream Terminal</h2>
        <pre id="terminal-output">[System] Ready. Select a skill or a use case, then submit a request.</pre>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const skillListEl = document.getElementById("skill-list");
      const selectedSkillEl = document.getElementById("selected-skill");
      const skillSearchEl = document.getElementById("skill-search");
      const analysisInputEl = document.getElementById("analysis-input");
      const logFileEl = document.getElementById("log-file");
      const dynamicInputsEl = document.getElementById("dynamic-inputs");
      const analyzeBtnEl = document.getElementById("analyze-btn");
      const statusTextEl = document.getElementById("status-text");
      const terminalEl = document.getElementById("terminal-output");
      const tabSkillsEl = document.getElementById("tab-skills");
      const tabUcEl = document.getElementById("tab-usecases");

      let browseMode = "skills";
      let selectedSkillName = "";
      let selectedUseCaseId = "";
      let allSkills = [];
      let allUseCases = [];

      function appendTerminal(text, isError) {
        const line = isError ? "[Error] " + text : text;
        terminalEl.textContent += "\n" + line;
        terminalEl.scrollTop = terminalEl.scrollHeight;
      }

      function setBusy(isBusy) {
        analyzeBtnEl.disabled = isBusy;
        statusTextEl.textContent = isBusy ? "Analyzing..." : "Idle";
      }

      function renderDynamicInputs(inputs) {
        dynamicInputsEl.innerHTML = "";
        if (!Array.isArray(inputs) || !inputs.length) {
          return;
        }

        inputs.forEach(inputDef => {
          const name = String(inputDef.name || "").trim();
          if (!name) {
            return;
          }

          const type = String(inputDef.type || "text").toLowerCase();
          const labelText = inputDef.label || name;
          const field = document.createElement("div");
          field.className = "dynamic-field";

          const label = document.createElement("label");
          label.setAttribute("for", "dynamic-" + name);
          label.textContent = labelText;
          field.appendChild(label);

          const hintText = String(inputDef.description || "").trim();
          if (hintText) {
            const hint = document.createElement("p");
            hint.className = "field-hint";
            hint.textContent = hintText;
            field.appendChild(hint);
          }

          if (type === "select") {
            const select = document.createElement("select");
            select.id = "dynamic-" + name;
            select.dataset.inputName = name;
            select.dataset.inputType = "select";
            const options = Array.isArray(inputDef.options) ? inputDef.options : [];
            options.forEach(opt => {
              const option = document.createElement("option");
              option.value = String(opt);
              option.textContent = String(opt);
              select.appendChild(option);
            });
            if (inputDef.default != null) {
              select.value = String(inputDef.default);
            }
            field.appendChild(select);
          } else if (type === "file") {
            const fileInput = document.createElement("input");
            fileInput.type = "file";
            fileInput.id = "dynamic-" + name;
            fileInput.dataset.inputName = name;
            fileInput.dataset.inputType = "file";
            if (inputDef.accept) {
              fileInput.accept = String(inputDef.accept);
            }
            field.appendChild(fileInput);
          } else {
            const textInput = document.createElement("input");
            textInput.type = "text";
            textInput.id = "dynamic-" + name;
            textInput.dataset.inputName = name;
            textInput.dataset.inputType = "text";
            textInput.placeholder = inputDef.placeholder || "";
            if (inputDef.default != null) {
              textInput.value = String(inputDef.default);
            }
            field.appendChild(textInput);
          }

          dynamicInputsEl.appendChild(field);
        });
      }

      function renderSkills(skills) {
        skillListEl.innerHTML = "";
        selectedSkillName = "";
        if (!skills.length) {
          skillListEl.innerHTML = "<li class='note'>No matching skills.</li>";
          selectedSkillEl.textContent = "Selected: none";
          renderDynamicInputs([]);
          return;
        }
        skills.forEach((skill, index) => {
          const li = document.createElement("li");
          li.className = "skill-item";
          li.innerHTML = "<strong>" + (skill.name || "(unnamed)") + "</strong>" +
            "<small>" + (skill.description || "No description") + "</small>";
          li.addEventListener("click", function () {
            Array.from(skillListEl.children).forEach(el => el.classList.remove("active"));
            li.classList.add("active");
            selectedSkillName = skill.name || "";
            selectedSkillEl.textContent = "Selected skill: " + selectedSkillName;
            renderDynamicInputs(skill.inputs || []);
          });
          if (index === 0 && skill.name) {
            li.classList.add("active");
            selectedSkillName = skill.name;
            selectedSkillEl.textContent = "Selected skill: " + selectedSkillName;
            renderDynamicInputs(skill.inputs || []);
          }
          skillListEl.appendChild(li);
        });
      }

      function renderUseCases(useCases) {
        skillListEl.innerHTML = "";
        selectedUseCaseId = "";
        if (!useCases.length) {
          skillListEl.innerHTML = "<li class='note'>No use cases available.</li>";
          selectedSkillEl.textContent = "Selected: none";
          renderDynamicInputs([]);
          return;
        }
        let picked = false;
        useCases.forEach((uc, index) => {
          const li = document.createElement("li");
          const avail = uc.available !== false;
          li.className = "skill-item" + (avail ? "" : " unavailable");
          li.innerHTML = "<strong>" + (uc.title || uc.id || "(untitled)") + "</strong>" +
            "<small>" + (uc.description || uc.id || "") + "</small>";
          li.addEventListener("click", function () {
            if (!avail) {
              appendTerminal("This use case is unavailable (underlying skill not loaded). Add a matching SKILL.md or sync skills from GitLab.", true);
              return;
            }
            Array.from(skillListEl.children).forEach(el => el.classList.remove("active"));
            li.classList.add("active");
            selectedUseCaseId = uc.id || "";
            selectedSkillEl.textContent = "Selected use case: " + (uc.title || selectedUseCaseId);
            renderDynamicInputs(uc.inputs || []);
          });
          if (!picked && avail && uc.id) {
            li.classList.add("active");
            selectedUseCaseId = uc.id;
            selectedSkillEl.textContent = "Selected use case: " + (uc.title || selectedUseCaseId);
            renderDynamicInputs(uc.inputs || []);
            picked = true;
          }
          skillListEl.appendChild(li);
        });
        if (!picked) {
          selectedSkillEl.textContent = "Selected: none (no available use cases)";
          renderDynamicInputs([]);
        }
      }

      function setBrowseMode(mode) {
        browseMode = mode;
        tabSkillsEl.classList.toggle("active", mode === "skills");
        tabUcEl.classList.toggle("active", mode === "usecases");
        tabSkillsEl.setAttribute("aria-selected", mode === "skills" ? "true" : "false");
        tabUcEl.setAttribute("aria-selected", mode === "usecases" ? "true" : "false");
        skillSearchEl.placeholder = mode === "skills" ? "Search skills..." : "Search use cases...";
        skillSearchEl.value = "";
        if (mode === "skills") {
          renderSkills(allSkills);
        } else {
          renderUseCases(allUseCases);
        }
      }

      function filterList() {
        const keyword = skillSearchEl.value.trim().toLowerCase();
        if (browseMode === "skills") {
          if (!keyword) {
            renderSkills(allSkills);
            return;
          }
          const filtered = allSkills.filter(skill => {
            const name = (skill.name || "").toLowerCase();
            const desc = (skill.description || "").toLowerCase();
            return name.includes(keyword) || desc.includes(keyword);
          });
          renderSkills(filtered);
          return;
        }
        if (!keyword) {
          renderUseCases(allUseCases);
          return;
        }
        const filtered = allUseCases.filter(uc => {
          const title = (uc.title || "").toLowerCase();
          const desc = (uc.description || "").toLowerCase();
          const id = (uc.id || "").toLowerCase();
          return title.includes(keyword) || desc.includes(keyword) || id.includes(keyword);
        });
        renderUseCases(filtered);
      }

      async function loadAll() {
        let skillsOk = false;
        let ucOk = false;
        try {
          const resSkills = await fetch("/api/skills");
          const dataSkills = await resSkills.json();
          if (Array.isArray(dataSkills) && dataSkills.length > 0) {
            allSkills = dataSkills;
            skillsOk = true;
          } else {
            allSkills = [];
            skillListEl.innerHTML = "<li class='note'>No skills found.</li>";
          }
        } catch (error) {
          skillListEl.innerHTML = "<li class='note'>Failed to load skills.</li>";
          appendTerminal("Failed to load skills: " + error.message, true);
        }
        try {
          const resUc = await fetch("/api/use-cases");
          const dataUc = await resUc.json();
          if (Array.isArray(dataUc)) {
            allUseCases = dataUc;
            ucOk = true;
          } else {
            allUseCases = [];
          }
        } catch (error) {
          appendTerminal("Failed to load use cases: " + error.message, true);
          allUseCases = [];
        }
        if (browseMode === "skills" && skillsOk) {
          renderSkills(allSkills);
        } else if (browseMode === "usecases" && ucOk) {
          renderUseCases(allUseCases);
        } else if (browseMode === "skills" && !skillsOk) {
          selectedSkillEl.textContent = "Selected: none";
        }
      }

      async function analyze() {
        const userInput = analysisInputEl.value.trim();
        if (browseMode === "usecases") {
          if (!selectedUseCaseId) {
            appendTerminal("Please select a use case first.", true);
            return;
          }
        } else if (!selectedSkillName) {
          appendTerminal("Please select a skill first.", true);
          return;
        }
        if (!userInput) {
          appendTerminal("Please enter analysis input.", true);
          return;
        }

        setBusy(true);
        if (browseMode === "usecases") {
          appendTerminal("[System] Submitting request for use case: " + selectedUseCaseId);
        } else {
          appendTerminal("[System] Submitting request for skill: " + selectedSkillName);
        }

        const selectedFile = logFileEl.files && logFileEl.files.length ? logFileEl.files[0] : null;
        const inputParams = {};
        let dynamicFile = null;
        const dynamicFields = dynamicInputsEl.querySelectorAll("[data-input-name]");
        dynamicFields.forEach(el => {
          const name = el.dataset.inputName;
          const type = el.dataset.inputType;
          if (!name) {
            return;
          }
          if (type === "file") {
            const picked = el.files && el.files.length ? el.files[0] : null;
            if (picked) {
              inputParams[name] = picked.name;
              if (!dynamicFile) {
                dynamicFile = picked;
              }
            }
            return;
          }
          if (el.value && String(el.value).trim()) {
            inputParams[name] = String(el.value).trim();
          }
        });

        const effectiveFile = selectedFile || dynamicFile;
        if (effectiveFile) {
          appendTerminal("[System] Attached log file: " + effectiveFile.name);
        }

        try {
          const formData = new FormData();
          if (browseMode === "usecases") {
            formData.append("use_case_id", selectedUseCaseId);
          } else {
            formData.append("skill_name", selectedSkillName);
          }
          formData.append("user_input", userInput);
          formData.append("input_params", JSON.stringify(inputParams));
          if (effectiveFile) {
            formData.append("log_file", effectiveFile);
          }

          const response = await fetch("/api/analyze", {
            method: "POST",
            body: formData
          });

          const data = await response.json();
          if (!response.ok) {
            appendTerminal(data.error || "Request failed", true);
          } else {
            if (data.mode) {
              appendTerminal("[System] Execution mode: " + data.mode);
            }
            if (data.execution_note) {
              appendTerminal("[System] " + data.execution_note);
            }
            appendTerminal("[AI] " + (data.result || "(empty response)"));
          }
        } catch (error) {
          appendTerminal("Network error: " + error.message, true);
        } finally {
          setBusy(false);
        }
      }

      tabSkillsEl.addEventListener("click", function () { setBrowseMode("skills"); });
      tabUcEl.addEventListener("click", function () { setBrowseMode("usecases"); });
      analyzeBtnEl.addEventListener("click", analyze);
      skillSearchEl.addEventListener("input", filterList);
      loadAll();
    })();
  </script>
</body>
</html>
