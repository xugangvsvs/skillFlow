# =============================================================================
# Use cases: business-facing scenarios that map to SKILL.md `name` values
# (typically synced from GitLab). Copy to use_cases.yaml to customize locally;
# config/use_cases.yaml is gitignored.
#
# Align `skill_name` with:
#   - the `name` field in each skill's SKILL.md front-matter
#   - keys in config/skill_adapters.yaml (when using tool-first execution)
# =============================================================================

use_cases:
  - id: efs-to-pfs
    title: 根据 EFS 文档编写 PFS
    description: 基于 EFS（特性说明）产出或更新 PFS（产品功能说明）结构与要点。
    skill_name: efs-to-pfs

  - id: pfs-to-icfs
    title: 根据 PFS 文档编写 ICFS
    description: 基于 PFS 推导接口与行为，编写 ICFS（接口控制功能说明）。
    skill_name: pfs-to-icfs

  - id: icfs-to-code-ut-sct
    title: 根据 ICFS 编写 Code、UT 与 SCT
    description: 依据 ICFS 生成实现代码、单元测试（UT）与系统/场景测试（SCT）要点或草稿。
    skill_name: icfs-to-code-ut-sct

  - id: analyze-pronto
    title: 分析 Pronto
    description: 针对给定 Pronto（缺陷单）做影响分析、复现建议与排查方向。
    skill_name: analyze-pronto
