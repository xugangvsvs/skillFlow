# =============================================================================
# SETUP: copy this file to skillflow.yaml (same directory), then edit values.
#   cp skillflow.example.yaml skillflow.yaml   # Linux / macOS
#   copy skillflow.example.yaml skillflow.yaml # Windows CMD
# skillflow.yaml is gitignored — safe for your URLs; this example stays in git.
# =============================================================================
# Precedence: environment variables override these values when set and non-empty.
# Do not put secrets here — use GITLAB_TOKEN in the environment for private GitLab.

# --- Skills (SKILL.md trees) ---
# If set, use this directory only (no GitLab clone/pull).
# skills_path: dev-skills

# GitLab skills repository (HTTPS). Leave empty to use local skills_path or default dev-skills/.
gitlab_repo_url: ""
gitlab_branch: main

# Clone/pull cache when gitlab_repo_url is set (default: var/gitlab-skills under project root).
# gitlab_skills_cache: ""

# --- LLM (optional; defaults match intranet Nokia endpoint) ---
# llm_api_url: "http://hzllmapi.dyn.nesc.nokia.net:8080/v1/chat/completions"
# llm_model: "qwen/qwen3-32b"

# --- Logging ---
# log_level: INFO

# --- Phase-1 remote nrm (LinSee via SSH) — configure via environment only ---
# SKILLFLOW_REMOTE_SSH_ENABLED=1          # off by default
# SKILLFLOW_REMOTE_SSH_IDENTITY=/path/to/key   # private key on SkillFlow host
# SKILLFLOW_REMOTE_SSH_USER=youruser
# SKILLFLOW_REMOTE_NRM_SCRIPTS=$HOME/.copilot/skills/nrm-coding-workflow/scripts
# SKILLFLOW_REMOTE_SSH_TIMEOUT_SEC=3600
# SKILLFLOW_REMOTE_SSH_HOST_ALLOWLIST=linsee.dyn.nesc.nokia.net,.linsee.example.net
# SKILLFLOW_REMOTE_SSH_USE_KNOWN_HOSTS_ONLY=1   # optional: StrictHostKeyChecking=yes
#
# Phase 2 (git apply) / Phase 3 (LLM suggest diff):
# SKILLFLOW_REMOTE_PATCH_MAX_BYTES=524288
# SKILLFLOW_REMOTE_PATCH_TIMEOUT_SEC=180
# SKILLFLOW_REMOTE_AGENT_MAX_ITERATIONS=8   # suggest-patch iteration_index must be 0 .. max-1
# SKILLFLOW_REMOTE_SUGGEST_PATCH_ENABLED=1  # set 0 to disable POST /api/remote/nrm-workflow/suggest-patch
