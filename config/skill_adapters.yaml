skills:
  analyze-ims2:
    execution_mode: tool-first
    tool:
      command: ims2_tool
      command_candidates:
        - "${IMS2_TOOL_PATH}"
        - "{IMS2_BIN_DIR}/ims2_tool"
        - ims2_tool
      mode_param: analysis_mode
      args_by_mode:
        topology:
          - --input
          - "{log_file_path}"
          - --quiet-status
          - analyzer
        state:
          - --input
          - "{log_file_path}"
          - --quiet-status
          - query
          - -r
          - "{focus_object}"
          - -m
          - last
        transitions:
          - --input
          - "{log_file_path}"
          - --quiet-status
          - walk
          - -r
          - "{focus_object}"
          - -c
        metadata:
          - --input
          - "{log_file_path}"
          - --quiet-status
          - ims2
      timeout_sec: 90
    fallback: llm-only
