skills:
  analyze-ims2:
    execution_mode: tool-first
    tool:
      command: ims2_tool
      command_candidates:
        - "${IMS2_TOOL_PATH}"
        - "{IMS2_BIN_DIR}/ims2_tool"
        - ims2_tool
      args_template:
        - analyzer
        - --input
        - "{log_file_path}"
      timeout_sec: 90
    fallback: llm-only
